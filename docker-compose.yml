version: "3.9"
services:
  supabase-db:
    image: supabase/postgres:15.8.1.060
    restart: unless-stopped
    networks:
      default:
        aliases:
          - db
    volumes:
      - type: bind
        source: ./infra/supabase/00-bootstrap.sh
        target: /docker-entrypoint-initdb.d/00-bootstrap.sh
        read_only: true
        bind:
          create_host_path: false
    environment:
      POSTGRES_DB: ${SUPABASE_DB_NAME:-postgres}
      POSTGRES_USER: ${SUPABASE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUPABASE_DB_USER:-postgres} -d ${SUPABASE_DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10

  supabase-db-init:
    image: supabase/postgres:15.8.1.060
    restart: "no"
    environment:
      SUPABASE_DB_NAME: ${SUPABASE_DB_NAME:-postgres}
      SUPABASE_DB_USER: ${SUPABASE_DB_USER:-postgres}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
    depends_on:
      supabase-db:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - |
        export PGPASSWORD="${SUPABASE_DB_PASSWORD}";
        until pg_isready -h supabase-db -p 5432 -U "${SUPABASE_DB_USER}" -d "${SUPABASE_DB_NAME}"; do
          sleep 2;
        done;
        for i in $(seq 1 120); do
          READY="$$(psql -h supabase-db -U "${SUPABASE_DB_USER}" -d "${SUPABASE_DB_NAME}" -tAc "
            SELECT CASE WHEN
              EXISTS (SELECT 1 FROM pg_namespace WHERE nspname = 'auth')
              AND EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon')
              AND EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated')
              AND EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role')
              AND EXISTS (SELECT 1 FROM pg_extension WHERE extname = 'postgis')
            THEN 1 ELSE 0 END
          " | tr -d '[:space:]')";
          if [ "$$READY" = "1" ]; then
            exit 0;
          fi;
          sleep 2;
        done;
        echo "Supabase bootstrap not ready (auth schema/roles/postgis missing)"; exit 1;

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/2181'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b 127.0.0.1:9092 1 30"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      # Security disabled for local/dev compose
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-}
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  supabase-auth:
    image: supabase/gotrue:v2.177.0
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://${SUPABASE_DB_USER:-postgres}:${SUPABASE_DB_PASSWORD:-postgres}@supabase-db:5432/${SUPABASE_DB_NAME:-postgres}?search_path=auth
      GOTRUE_DB_NAMESPACE: auth
      GOTRUE_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000},http://localhost:3000/**
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_ISSUER: http://supabase-kong:8000/auth/v1
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_HOST: mailhog
      GOTRUE_SMTP_PORT: 1025
      GOTRUE_SMTP_ADMIN_EMAIL: noreply@porta.local
      API_EXTERNAL_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:54321}
    depends_on:
      supabase-db:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9999/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://${SUPABASE_DB_USER:-postgres}:${SUPABASE_DB_PASSWORD:-postgres}@supabase-db:5432/${SUPABASE_DB_NAME:-postgres}
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_SERVER_PORT: 3000
    depends_on:
      supabase-db:
        condition: service_healthy

  supabase-realtime:
    image: supabase/realtime:latest
    restart: unless-stopped
    environment:
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: ${SUPABASE_DB_USER:-postgres}
      DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
      DB_NAME: ${SUPABASE_DB_NAME:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      PORT: 4000
      JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      METRICS_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      SECRET_KEY_BASE: ${SUPABASE_REALTIME_SECRET_KEY_BASE:-super-secret-key-base-change-me}
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      ERL_AFLAGS: "-proto_dist inet_tcp"
    depends_on:
      supabase-db:
        condition: service_healthy

  supabase-storage:
    image: supabase/storage-api:latest
    restart: unless-stopped
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      AUTH_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      AUTH_JWT_ISSUER: http://supabase-kong:8000/auth/v1
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      DATABASE_URL: postgres://${SUPABASE_DB_USER:-postgres}:${SUPABASE_DB_PASSWORD:-postgres}@supabase-db:5432/${SUPABASE_DB_NAME:-postgres}
      DATABASE_NAMESPACE: storage
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - supabase_storage:/var/lib/storage
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-auth:
        condition: service_healthy
      supabase-rest:
        condition: service_started

  supabase-meta:
    image: supabase/postgres-meta:v0.95.2
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${SUPABASE_DB_NAME:-postgres}
      PG_META_DB_USER: ${SUPABASE_DB_USER:-postgres}
      PG_META_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
    depends_on:
      supabase-db:
        condition: service_healthy

  supabase-kong:
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "54321:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
    volumes:
      - ./infra/supabase/kong.yml:/home/kong/kong.yml:ro
    depends_on:
      supabase-auth:
        condition: service_started
      supabase-rest:
        condition: service_started
      supabase-realtime:
        condition: service_started
      supabase-storage:
        condition: service_started
      supabase-meta:
        condition: service_started

  supabase-studio:
    image: ${SUPABASE_STUDIO_IMAGE:-supabase/studio:latest}
    restart: unless-stopped
    ports:
      - "54323:3000"
    volumes:
      - ./infra/supabase/functions:/tmp/functions
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_REST_URL: http://supabase-kong:8000/rest/v1/
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:54321}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      AUTH_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
      EDGE_FUNCTIONS_MANAGEMENT_FOLDER: /tmp/functions
      DEFAULT_ORGANIZATION_NAME: local
      DEFAULT_PROJECT_NAME: nextjs_porta
      NEXT_PUBLIC_ENABLE_LOGS: "true"
    depends_on:
      supabase-kong:
        condition: service_started
      supabase-meta:
        condition: service_started

  listing-service:
    build:
      context: ./services/listing-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - ./.env
    environment:
      KAFKA_BROKERS: kafka:9092
      SUPABASE_DB_JDBC_URL: jdbc:postgresql://supabase-db:5432/${SUPABASE_DB_NAME:-postgres}?sslmode=disable
      SUPABASE_DB_USER: ${SUPABASE_DB_USER:-postgres}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-http://supabase-kong:8000/auth/v1}
    depends_on:
      kafka:
        condition: service_healthy
      supabase-db:
        condition: service_healthy
      supabase-db-init:
        condition: service_completed_successfully
      supabase-kong:
        condition: service_started
      media-service:
        condition: service_started

  search-service:
    build:
      context: ./services/search-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8082:8082"
    env_file:
      - ./.env
    environment:
      KAFKA_BROKERS: kafka:9092
      OPENSEARCH_URL: http://opensearch:9200
      LISTING_SERVICE_PUBLIC_URL: http://listing-service:8081/api/v1/public/listings
      SUPABASE_DB_JDBC_URL: jdbc:postgresql://supabase-db:5432/${SUPABASE_DB_NAME:-postgres}?sslmode=disable
      SUPABASE_DB_USER: ${SUPABASE_DB_USER:-postgres}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-http://supabase-kong:8000/auth/v1}
    depends_on:
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      listing-service:
        condition: service_started
      supabase-db:
        condition: service_healthy
      supabase-db-init:
        condition: service_completed_successfully
      supabase-kong:
        condition: service_started

  messaging-service:
    build:
      context: ./services/messaging-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8083:8083"
    env_file:
      - ./.env
    environment:
      KAFKA_BROKERS: kafka:9092
      LISTING_SERVICE_URL: http://listing-service:8081
      SUPABASE_DB_JDBC_URL: jdbc:postgresql://supabase-db:5432/${SUPABASE_DB_NAME:-postgres}?sslmode=disable
      SUPABASE_DB_USER: ${SUPABASE_DB_USER:-postgres}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-http://supabase-kong:8000/auth/v1}
    depends_on:
      kafka:
        condition: service_healthy
      listing-service:
        condition: service_started
      supabase-db:
        condition: service_healthy
      supabase-db-init:
        condition: service_completed_successfully
      supabase-kong:
        condition: service_started

  billing-service:
    build:
      context: ./services/billing-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8084:8084"
    env_file:
      - ./.env
    environment:
      SUPABASE_DB_JDBC_URL: jdbc:postgresql://supabase-db:5432/${SUPABASE_DB_NAME:-postgres}?sslmode=disable
      SUPABASE_DB_USER: ${SUPABASE_DB_USER:-postgres}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-http://supabase-kong:8000/auth/v1}
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-db-init:
        condition: service_completed_successfully
      supabase-kong:
        condition: service_started

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8085:8085"
    env_file:
      - ./.env
    environment:
      KAFKA_BROKERS: kafka:9092
      MAILHOG_SMTP_HOST: mailhog
      MAILHOG_SMTP_PORT: 1025
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    depends_on:
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_started

  media-service:
    build:
      context: ./services/media-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8086:8086"
    env_file:
      - ./.env
    environment:
      SUPABASE_DB_JDBC_URL: jdbc:postgresql://supabase-db:5432/${SUPABASE_DB_NAME:-postgres}?sslmode=disable
      SUPABASE_DB_USER: ${SUPABASE_DB_USER:-postgres}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-http://supabase-kong:8000/auth/v1}
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-db-init:
        condition: service_completed_successfully
      supabase-kong:
        condition: service_started

  geo-service:
    build:
      context: ./services/geo-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8087:8087"
    env_file:
      - ./.env
    environment:
      SUPABASE_DB_JDBC_URL: jdbc:postgresql://supabase-db:5432/${SUPABASE_DB_NAME:-postgres}?sslmode=disable
      SUPABASE_DB_USER: ${SUPABASE_DB_USER:-postgres}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-db-init:
        condition: service_completed_successfully
      supabase-kong:
        condition: service_started

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8088:8088"
    env_file:
      - ./.env
    environment:
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-http://supabase-kong:8000/auth/v1}
    depends_on:
      supabase-kong:
        condition: service_started

  gateway-service:
    build:
      context: ./services/gateway-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SEARCH_SERVICE_URL: http://search-service:8082
      USER_SERVICE_URL: http://user-service:8088
      LISTING_SERVICE_URL: http://listing-service:8081
      MESSAGING_SERVICE_URL: http://messaging-service:8083
      GEO_SERVICE_URL: http://geo-service:8087
      BILLING_SERVICE_URL: http://billing-service:8084
      MEDIA_SERVICE_URL: http://media-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-http://supabase-kong:8000/auth/v1}
    depends_on:
      redis:
        condition: service_healthy
      supabase-kong:
        condition: service_started
      search-service:
        condition: service_started
      user-service:
        condition: service_started
      listing-service:
        condition: service_started
      messaging-service:
        condition: service_started
      geo-service:
        condition: service_started
      billing-service:
        condition: service_started
      media-service:
        condition: service_started
      notification-service:
        condition: service_started

  ui:
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      API_BASE_INTERNAL: http://gateway-service:8080
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    depends_on:
      gateway-service:
        condition: service_started
      supabase-kong:
        condition: service_started

  admin-dashboard:
    build:
      context: ./admin-dashboard-angular
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${ADMIN_API_BASE_URL:-http://localhost:8080}
        SUPABASE_URL: ${ADMIN_SUPABASE_URL:-http://localhost:54321}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      gateway-service:
        condition: service_started
      supabase-kong:
        condition: service_started

volumes:
  supabase_storage:
