server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://127.0.0.1:3000"
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: search-service
          uri: ${SEARCH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/public/search/**,/api/v1/admin/search/**
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/v1/admin/users/**
        - id: listing-service
          uri: ${LISTING_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/public/listings/**,/api/v1/listings/**,/api/v1/admin/listings/**,/api/v1/public/categories/**
        - id: messaging-service
          uri: ${MESSAGING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/conversations/**,/api/v1/messages/**
        - id: geo-service
          uri: ${GEO_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/public/locations/**,/api/v1/locations/**
        - id: geo-service-frontend-proxy
          uri: ${GEO_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/geo/**
          filters:
            - RewritePath=/api/geo/(?<segment>.*), /api/v1/public/$\{segment}
        - id: billing-service
          uri: ${BILLING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/billing/**
        - id: media-service
          uri: ${MEDIA_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/media/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/notifications/**
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 20
            redis-rate-limiter.burstCapacity: 40
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
