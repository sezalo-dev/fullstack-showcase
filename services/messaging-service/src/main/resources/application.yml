server:
  port: 8083

spring:
  application:
    name: messaging-service
  datasource:
    url: ${SUPABASE_DB_JDBC_URL:}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 30000
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    table: flyway_schema_history_messaging
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:29092}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER:http://supabase-kong:8000/auth/v1}

# Listing service integration
# Note: If listing-service is running on a different port, set LISTING_SERVICE_URL environment variable
# Default is 8081, but if that port is occupied, set LISTING_SERVICE_URL=http://localhost:PORT
listing:
  service:
    url: ${LISTING_SERVICE_URL:http://localhost:8081}

